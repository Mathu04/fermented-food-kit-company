
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>CaterServ : Signup</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/fav.jpg" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">

</head>

<body>
  
<section class="signup-section py-5">
<div class="container">

<div class="row justify-content-center align-items-center">

<!-- Image Side -->
<div class="col-lg-6 d-none d-lg-block">
<img src="img/hero.png" class="img-fluid rounded signup-img">
</div>

<!-- Form Side -->
<div class="col-lg-5 col-md-8">

<div class="signup-card shadow-lg p-5">
<a href="index.html" class="navbar-brand">
                        <h1 class="text-primary fw-bold mb-0 text-center">Cater<span class="text-dark">Serv</span> </h1>
                    </a>

<p class="text-center text-muted mb-4">
Join us to explore fermentation kits, recipes, and guides.
</p>

<form>

<div class="mb-3">
<label class="form-label">Full Name</label>
<input type="text" class="form-control" placeholder="Enter your name">
</div>

<div class="mb-3">
<label class="form-label">Email Address</label>
<input type="email" class="form-control" placeholder="Enter your email">
</div>

<div class="mb-3">
<label class="form-label">Password</label>
<input type="password" class="form-control" placeholder="Create password">
</div>

<div class="mb-3">
<label class="form-label">Confirm Password</label>
<input type="password" class="form-control" placeholder="Confirm password">
</div>

<div class="form-check mb-3">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">
I agree to the Terms & Conditions
</label>
</div>

<button class="btn btn-success w-100 signup-btn">
Create Account
</button>

<p class="text-center mt-3">
Already have an account?
<a href="login.html" class="login-link">Login</a>
</p>

</form>

</div>

</div>

</div>

</div>
</section>


    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/wow/wow.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>

    <!-- Template Javascript -->
    <script src="js/main.js"></script>
</body>

</html>
