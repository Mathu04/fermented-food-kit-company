<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Fermented Food Kit : Login</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="" name="keywords">
    <meta content="" name="description">

    <!-- Favicon -->
    <link href="img/fav.jpg" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600&family=Nunito:wght@600;700;800&display=swap"
        rel="stylesheet">

    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="lib/animate/animate.min.css" rel="stylesheet">
    <link href="lib/owlcarousel/assets/owl.carousel.min.css" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="css/bootstrap.min.css" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="css/style.css" rel="stylesheet">


</head>

<body>
   

<section class="login-section py-5">
<div class="container">

<div class="row justify-content-center align-items-center">

<!-- Image -->
<div class="col-lg-6 d-none d-lg-block">
<img src="img/blog4.jpg" class="img-fluid login-img">
</div>

<!-- Login Form -->
<div class="col-lg-5 col-md-8">

<div class="login-card shadow-lg p-5">
 <a href="index.html" class="navbar-brand">
                        <h1 class="text-primary fw-bold mb-0 text-center">Cater<span class="text-dark">Serv</span> </h1>
                    </a>
<h2 class="text-center fw-bold mb-3">Welcome Back</h2>
<p class="text-center text-muted mb-4">
Login to continue your fermentation journey
</p>

<form>

<div class="mb-3">
<label>Email Address</label>
<input type="email" class="form-control" placeholder="Enter your email">
</div>

<div class="mb-3 position-relative">
  <label>Password</label>
  <input type="password" class="form-control pe-5" id="password" placeholder="Enter password">
  
  <!-- Eye Icon -->
  <span class="toggle-password" onclick="togglePassword()">
    <i class="bi bi-eye" id="eyeIcon"></i>
  </span>
</div>

<div class="d-flex justify-content-between mb-3">

<div class="form-check">
<input class="form-check-input" type="checkbox">
<label class="form-check-label">Remember me</label>
</div>

<a href="#" class="forgot-link">Forgot Password?</a>

</div>

<button class="btn btn-primary w-100 login-btn">
Login
</button>

</form>

<!-- Divider -->
<div class="divider text-center my-4">
<span>OR</span>
</div>

<!-- Social Login -->

<button class="btn google-btn w-100 mb-3">
<i class="fab fa-google me-2"></i> Continue with Google
</button>

<button class="btn github-btn w-100 mb-3">
<i class="fab fa-github me-2"></i> Continue with GitHub
</button>

<button class="btn github-btn w-100 mb-3">
<i class="fab fa-apple me-2"></i> Continue with Apple
</button>

<p class="text-center mt-4">
Don't have an account?
<a href="signup.html" class="signup-link">Sign Up</a>
</p>

</div>

</div>

</div>

</div>
</section>


    <!-- JavaScript Libraries -->
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="lib/wow/wow.min.js"></script>
    <script src="lib/easing/easing.min.js"></script>
    <script src="lib/waypoints/waypoints.min.js"></script>
    <script src="lib/owlcarousel/owl.carousel.min.js"></script>

    <!-- Template Javascript -->
    <script src="js/main.js"></script>
    
</body>

</html>
